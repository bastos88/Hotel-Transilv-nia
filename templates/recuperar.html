{% extends "base.html" %}

{% block title %}Recuperar Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="logo">🔑</div>
        <h2>Recuperar Password</h2>
        <p style="color: #94a3b8;">Digite o seu email para receber o link de recuperação</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required autofocus>
        </div>
        <button type="submit" class="btn">📧 Enviar Link</button>
    </form>

    <div class="links">
        <hr>
        <a href="{{ url_for('login') }}">← Voltar ao Login</a>
    </div>
</div>
{% endblock %}
