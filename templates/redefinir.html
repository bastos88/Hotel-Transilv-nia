{% extends "base.html" %}

{% block title %}Redefinir Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="logo">🔐</div>
        <h2>Redefinir Password</h2>
        <p style="color: #94a3b8;">Digite a sua nova password</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Nova Password</label>
            <input type="password" name="nova_password" required>
            <small>Mínimo 6 caracteres</small>
        </div>

        <div class="form-group">
            <label>Confirmar Password</label>
            <input type="password" name="confirmar" required>
        </div>

        <button type="submit" class="btn">✅ Redefinir</button>
    </form>

    <div class="links">
        <hr>
        <a href="{{ url_for('login') }}">← Voltar ao Login</a>
    </div>
</div>
{% endblock %}
