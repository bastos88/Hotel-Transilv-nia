{% extends "base.html" %}

{% block title %}Meu Perfil{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="logo">👤</div>
        <h2>Meu Perfil</h2>
        <p style="color: #94a3b8;">Informações da sua conta</p>
    </div>

    <div style="background: #1e293b; border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem;">
        <p><strong>👤 Username:</strong> {{ username }}</p>
        <p><strong>📛 Nome:</strong> {{ nome }}</p>
        <p><strong>📧 Email:</strong> {{ email }}</p>
        <p><strong>🔐 Sessão iniciada em:</strong> {{ session.created|default('N/A') }}</p>
    </div>

    <div class="links">
        <a href="{{ url_for('dashboard') }}" style="display: inline-block; margin-top: 1rem;">← Voltar ao Dashboard</a>
    </div>
</div>
{% endblock %}
